<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#0f0f14"/>

  <!-- Outer orbital ring -->
  <circle cx="16" cy="16" r="12" stroke="#6366f1" stroke-width="0.75" stroke-dasharray="2 3" opacity="0.5"/>

  <!-- Connection lines from center to nodes -->
  <line x1="16" y1="16" x2="16" y2="4"  stroke="#818cf8" stroke-width="0.8" opacity="0.6"/>
  <line x1="16" y1="16" x2="28" y2="16" stroke="#38bdf8" stroke-width="0.8" opacity="0.6"/>
  <line x1="16" y1="16" x2="16" y2="28" stroke="#4ade80" stroke-width="0.8" opacity="0.6"/>
  <line x1="16" y1="16" x2="4"  y2="16" stroke="#c4b5fd" stroke-width="0.8" opacity="0.6"/>

  <!-- Provider nodes -->
  <circle cx="16" cy="4"  r="2" fill="#818cf8"/>
  <circle cx="28" cy="16" r="2" fill="#38bdf8"/>
  <circle cx="16" cy="28" r="2" fill="#4ade80"/>
  <circle cx="4"  cy="16" r="2" fill="#c4b5fd"/>

  <!-- Central membrane orb -->
  <circle cx="16" cy="16" r="5" fill="url(#memGrad)" opacity="0.95"/>
  <radialGradient id="memGrad" cx="40%" cy="35%" r="60%">
    <stop offset="0%"   stop-color="#a78bfa"/>
    <stop offset="100%" stop-color="#6366f1" stop-opacity="0.6"/>
  </radialGradient>

  <!-- Inner ring on orb -->
  <circle cx="16" cy="16" r="5" stroke="#fff" stroke-width="0.4" stroke-opacity="0.2"/>
</svg>
